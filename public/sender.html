<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="theme-color" content="#000000">
<link rel="manifest" href="/sender.webmanifest">
<link rel="icon" type="image/svg+xml" href="/icon-sender.svg">
<title>Reflektor — Camera</title>
<style>
  html,body{margin:0;height:100%;background:#000;color:#fff;font-family:system-ui,-apple-system,Segoe UI,sans-serif;overflow:hidden;touch-action:manipulation;-webkit-user-select:none;user-select:none}
  #preview{position:fixed;inset:0;width:100%;height:100%;object-fit:cover;background:#000}
  .bar{position:fixed;top:0;left:0;right:0;display:flex;gap:8px;padding:10px env(safe-area-inset-right,10px) 10px env(safe-area-inset-left,10px);padding-top:calc(10px + env(safe-area-inset-top,0px));background:linear-gradient(#000a,#0000);align-items:center;z-index:10;flex-wrap:wrap}
  select,button{font:inherit;background:rgba(255,255,255,.12);color:#fff;border:1px solid rgba(255,255,255,.22);border-radius:10px;padding:10px 14px;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
  button.primary{background:#2a8a55;border-color:#3aab6c}
  button.primary.stop{background:#a02a2a;border-color:#c64242}
  button.tog{background:#2a6a8a;border-color:#3a8aab}
  button:disabled{opacity:.4}
  select{max-width:42vw;text-overflow:ellipsis}
  #stat{position:fixed;bottom:8px;left:8px;right:8px;font:11px/1.4 ui-monospace,SFMono-Regular,Menlo,monospace;background:rgba(0,0,0,.55);padding:8px 10px;border-radius:6px;z-index:10;white-space:pre-wrap;color:#eaeaea}
  #dot{width:10px;height:10px;border-radius:50%;background:#888;flex:0 0 auto}
  #dot.on{background:#4eff7a;box-shadow:0 0 8px #4eff7a88}
  #dot.warn{background:#ffaa30}
  #status{font-size:13px;opacity:.85}
  body.blanked{background:#000}
  body.blanked .bar,body.blanked #preview,body.blanked #stat{display:none}
  body.blanked #tap{display:flex}
  #tap{display:none;position:fixed;inset:0;align-items:flex-end;justify-content:center;padding-bottom:env(safe-area-inset-bottom,24px);color:#222;font-size:10px;background:#000;z-index:20;-webkit-tap-highlight-color:transparent}
</style>
</head>
<body>
<video id="preview" autoplay muted playsinline></video>
<div class="bar">
  <span id="dot"></span>
  <span id="status">idle</span>
  <select id="cam" title="camera"></select>
  <select id="res" title="resolution">
    <option value="1920x1080@60">1080p60</option>
    <option value="1920x1080@30">1080p30</option>
    <option value="3840x2160@30">2160p30</option>
    <option value="1280x720@60">720p60</option>
    <option value="1280x720@30">720p30</option>
  </select>
  <select id="codec" title="codec">
    <option value="H264">H.264</option>
    <option value="VP8">VP8</option>
    <option value="VP9">VP9</option>
    <option value="AV1">AV1</option>
  </select>
  <button id="audio" title="Include microphone / system audio in the stream">Audio: off</button>
  <button id="go" class="primary">Start</button>
  <button id="screen" title="Share screen instead of camera">Screen</button>
  <button id="blank" hidden title="Hide preview to save OLED power">Screen off</button>
  <button id="lock" hidden title="Lock current screen orientation">Lock</button>
  <button id="probe" hidden title="Embed timestamp barcode in stream for end-to-end latency measurement">Probe</button>
  <button id="install" hidden title="Install Reflektor as an app">Install</button>
</div>
<div id="stat"></div>
<div id="tap" aria-hidden="true">tap to wake</div>
<script>
(() => {
  const $ = (id) => document.getElementById(id);
  const setStatus = (s) => { $('status').textContent = s; };
  const setDot = (cls) => { $('dot').className = ''; if (cls) $('dot').classList.add(cls); };

  // ---- State ----
  const pcs = new Map();     // peerId → { pc, sender, audioSender, dc }
  let ws = null, stream = null, source = 'camera';
  let audioEnabled = false;
  let serverId = null, myPeerId = null, multiReceiverEnabled = false;
  let wakeLock = null, statsTimer = null;
  // Probe state — canvas + draw loop is shared; one data channel per pc.
  let probeActive = false, probeCanvas = null, probeCtx = null, probeStream = null;
  let probeRaf = null, origVideoTrack = null;
  let orientationLocked = false;
  let deferredInstall = null;

  // ---- Storage ----
  const LS = {
    get: (k, fb = null) => { try { const v = localStorage.getItem('reflektor:' + k); return v === null ? fb : JSON.parse(v); } catch { return fb; } },
    set: (k, v) => { try { localStorage.setItem('reflektor:' + k, JSON.stringify(v)); } catch {} },
  };
  const SS = {
    get: (k, fb = null) => { try { const v = sessionStorage.getItem('reflektor:' + k); return v === null ? fb : JSON.parse(v); } catch { return fb; } },
    set: (k, v) => { try { sessionStorage.setItem('reflektor:' + k, JSON.stringify(v)); } catch {} },
  };
  function persistSelect(id) {
    const el = $(id);
    const key = 'reflektor:' + id;
    const saved = localStorage.getItem(key);
    if (saved && [...el.options].some(o => o.value === saved)) el.value = saved;
    el.addEventListener('change', () => localStorage.setItem(key, el.value));
  }

  // ---- Helpers ----
  function parseRes(v) { const m = v.match(/^(\d+)x(\d+)@(\d+)$/); return { w: +m[1], h: +m[2], fps: +m[3] }; }

  function preferCodec(transceiver, name) {
    if (!RTCRtpSender.getCapabilities) return null;
    const caps = RTCRtpSender.getCapabilities('video');
    if (!caps) return null;
    const re = new RegExp(name, 'i');
    const wanted = caps.codecs.filter(c => re.test(c.mimeType));
    if (wanted.length && transceiver.setCodecPreferences) {
      transceiver.setCodecPreferences(wanted);
      return wanted[0].mimeType;
    }
    return null;
  }

  async function tuneSender(sender) {
    if (!sender) return;
    const params = sender.getParameters();
    if (!params.encodings || !params.encodings[0]) params.encodings = [{}];
    params.encodings[0].maxBitrate = 20_000_000;
    params.encodings[0].priority = 'high';
    params.encodings[0].networkPriority = 'high';
    params.degradationPreference = 'maintain-framerate';
    try { await sender.setParameters(params); } catch (e) { console.warn('setParameters', e); }
  }

  async function acquireWake() { try { wakeLock = await navigator.wakeLock?.request('screen'); } catch {} }
  function releaseWake() { if (wakeLock) { try { wakeLock.release(); } catch {} wakeLock = null; } }

  // ---- Listings ----
  async function listCams() {
    try { const tmp = await navigator.mediaDevices.getUserMedia({ video: true }); tmp.getTracks().forEach(t => t.stop()); } catch {}
    const devs = await navigator.mediaDevices.enumerateDevices();
    const cams = devs.filter(d => d.kind === 'videoinput');
    $('cam').innerHTML = cams.map((c, i) =>
      `<option value="${c.deviceId}">${(c.label || 'Camera ' + (i+1)).replace(/\s*\(.+\)\s*$/,'')}</option>`
    ).join('');
    const rear = cams.find(c => /back|rear|environment/i.test(c.label));
    if (rear) $('cam').value = rear.deviceId;
  }

  // ---- UI toggles ----
  function setBlanked(on) { document.body.classList.toggle('blanked', on); }
  $('blank').onclick = (e) => { e.stopPropagation(); setBlanked(true); SS.set('blank', true); };
  $('tap').addEventListener('click', () => { setBlanked(false); SS.set('blank', false); });

  function setAudio(on) {
    audioEnabled = on;
    LS.set('audio', on);
    $('audio').classList.toggle('tog', on);
    $('audio').textContent = on ? 'Audio: on' : 'Audio: off';
  }
  $('audio').onclick = () => setAudio(!audioEnabled);

  async function toggleOrientationLock() {
    const so = screen.orientation;
    if (!so || !so.lock) { setStatus('orientation lock not supported'); return; }
    if (orientationLocked) {
      try { so.unlock(); } catch {}
      orientationLocked = false;
      $('lock').textContent = 'Lock';
      return;
    }
    const isStandalone = matchMedia('(display-mode: fullscreen),(display-mode: standalone)').matches;
    if (!isStandalone && !document.fullscreenElement) {
      try { await document.documentElement.requestFullscreen(); }
      catch { setStatus('lock needs fullscreen — install as app or allow fullscreen'); return; }
    }
    try {
      await so.lock(so.type);
      orientationLocked = true;
      $('lock').textContent = 'Unlock';
    } catch (e) { setStatus('lock failed: ' + e.message); }
  }
  $('lock').onclick = toggleOrientationLock;

  // PWA install
  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredInstall = e;
    $('install').hidden = false;
  });
  $('install').onclick = async () => {
    if (!deferredInstall) return;
    deferredInstall.prompt();
    await deferredInstall.userChoice.catch(() => {});
    deferredInstall = null;
    $('install').hidden = true;
  };
  window.addEventListener('appinstalled', () => { deferredInstall = null; $('install').hidden = true; });
  if ('serviceWorker' in navigator) {
    addEventListener('load', () => navigator.serviceWorker.register('/sw.js').catch(() => {}));
  }

  // ---- Acquire source ----
  async function getSourceStream() {
    const { w, h, fps } = parseRes($('res').value);
    if (source === 'screen') {
      // getDisplayMedia rejects `min` constraints — use ideal-only.
      return await navigator.mediaDevices.getDisplayMedia({
        video: { width: { ideal: w }, height: { ideal: h }, frameRate: { ideal: fps } },
        audio: audioEnabled,
      });
    }
    const deviceId = $('cam').value;
    return await navigator.mediaDevices.getUserMedia({
      audio: audioEnabled,
      video: {
        deviceId: deviceId ? { exact: deviceId } : undefined,
        width: { ideal: w }, height: { ideal: h },
        frameRate: { ideal: fps, min: Math.min(30, fps) },
      },
    });
  }

  // ---- Start / Stop ----
  async function start(src = 'camera') {
    source = src;
    $('go').disabled = true; $('screen').disabled = true;
    setStatus(src === 'screen' ? 'opening screen…' : 'opening camera…');
    setDot('warn');

    try { stream = await getSourceStream(); }
    catch (e) {
      setStatus((src === 'screen' ? 'screen' : 'camera') + ' error: ' + e.message);
      $('go').disabled = false; $('screen').disabled = false;
      return;
    }
    const vt = stream.getVideoTracks()[0];
    if (vt) vt.addEventListener('ended', () => stop());

    $('preview').srcObject = stream;

    setStatus('connecting…');
    ws = new WebSocket(`wss://${location.host}/ws?role=sender`);
    ws.onmessage = onWsMessage;
    ws.onclose = () => { setDot('warn'); };
    await new Promise((res, rej) => { ws.onopen = res; ws.onerror = () => rej(new Error('ws')); });

    setStatus('waiting for receiver…');
    startStats();
    await acquireWake();
    $('go').textContent = 'Stop';
    $('go').classList.add('stop');
    $('go').disabled = false;
    $('go').onclick = stop;
    $('screen').hidden = true;
    $('audio').disabled = true;
    $('blank').hidden = false;
    $('lock').hidden = false;
    $('probe').hidden = false;
    SS.set('streaming', true);
    SS.set('source', src);
  }

  function stop() {
    SS.set('streaming', false);
    SS.set('probe', false);
    SS.set('blank', false);
    if (statsTimer) { clearInterval(statsTimer); statsTimer = null; }
    for (const { pc } of pcs.values()) { try { pc.close(); } catch {} }
    pcs.clear();
    if (ws) { try { ws.close(); } catch {} ws = null; }
    if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
    releaseWake();
    setBlanked(false);
    $('preview').srcObject = null;
    $('stat').textContent = '';
    setStatus('stopped');
    setDot('');
    $('go').textContent = 'Start';
    $('go').classList.remove('stop');
    $('go').onclick = () => start('camera');
    $('go').disabled = false;
    $('screen').hidden = false;
    $('screen').disabled = false;
    $('audio').disabled = false;
    $('blank').hidden = true;
    if (orientationLocked) { try { screen.orientation.unlock(); } catch {} orientationLocked = false; }
    $('lock').textContent = 'Lock';
    $('lock').hidden = true;
    if (probeActive) { stopProbe(); probeActive = false; }
    $('probe').textContent = 'Probe';
    $('probe').classList.remove('stop');
    $('probe').hidden = true;
    probeCanvas = null; probeCtx = null;
  }

  // ---- WS handling ----
  async function onWsMessage({ data }) {
    let msg; try { msg = JSON.parse(data); } catch { return; }
    const { type } = msg;
    if (type === 'hello') {
      if (serverId && serverId !== msg.serverId) {
        console.log('[reflektor] server restarted, reloading');
        location.reload();
        return;
      }
      serverId = msg.serverId;
      myPeerId = msg.peerId;
      multiReceiverEnabled = !!msg.multiReceiver;
    } else if (type === 'peer-joined') {
      await createPcFor(msg.peerId);
    } else if (type === 'peer-left') {
      const ctx = pcs.get(msg.peerId);
      if (ctx) { try { ctx.pc.close(); } catch {} pcs.delete(msg.peerId); }
    } else if (type === 'answer') {
      const ctx = pcs.get(msg.from);
      if (ctx) await ctx.pc.setRemoteDescription({ type: 'answer', sdp: msg.sdp }).catch(e => console.warn('setRemoteDescription', e));
    } else if (type === 'ice') {
      const ctx = pcs.get(msg.from);
      if (ctx) await ctx.pc.addIceCandidate(msg.candidate).catch(() => {});
    }
  }

  async function createPcFor(peerId) {
    if (!stream) return;
    const existing = pcs.get(peerId);
    if (existing) { try { existing.pc.close(); } catch {} pcs.delete(peerId); }

    const pc = new RTCPeerConnection({ iceServers: [] });

    const initialVideoTrack = probeActive && probeStream
      ? probeStream.getVideoTracks()[0]
      : stream.getVideoTracks()[0];
    const vtx = pc.addTransceiver(initialVideoTrack, { direction: 'sendonly', streams: [stream] });
    preferCodec(vtx, $('codec').value);
    const sender = vtx.sender;

    let audioSender = null;
    const at = stream.getAudioTracks()[0];
    if (at) {
      const atx = pc.addTransceiver(at, { direction: 'sendonly', streams: [stream] });
      audioSender = atx.sender;
    }

    const dc = pc.createDataChannel('probe', { ordered: false, maxRetransmits: 0 });
    dc.onmessage = (ev) => onProbeMessage(ev, dc);

    pc.onicecandidate = (e) => {
      if (e.candidate && ws?.readyState === 1) {
        ws.send(JSON.stringify({ type: 'ice', to: peerId, candidate: e.candidate }));
      }
    };
    pc.onconnectionstatechange = () => {
      const s = pc.connectionState;
      setStatus(`webrtc ${peerId.slice(0, 4)}: ${s}`);
      if (s === 'connected') { setDot('on'); tuneSender(sender); }
      else if (s === 'failed' || s === 'disconnected') setDot('warn');
    };

    pcs.set(peerId, { pc, sender, audioSender, dc });

    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);
    if (ws?.readyState === 1) {
      ws.send(JSON.stringify({ type: 'offer', to: peerId, sdp: offer.sdp }));
    }
  }

  // ---- Probe ----
  function drawBarcode(ctx, w, h, tMs) {
    const bits = 32;
    const colW = w / bits;
    const rowH = Math.max(28, Math.floor(h * 0.05));
    const t = (Math.floor(tMs) >>> 0);
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, w, rowH);
    ctx.fillStyle = '#fff';
    for (let i = 0; i < bits; i++) {
      if ((t >>> i) & 1) ctx.fillRect(Math.floor(i * colW), 0, Math.ceil(colW) + 1, rowH);
    }
  }

  async function startProbe() {
    if (!stream || pcs.size === 0) return;
    const { w, h } = parseRes($('res').value);
    if (!probeCanvas) {
      probeCanvas = document.createElement('canvas');
      probeCtx = probeCanvas.getContext('2d', { alpha: false });
    }
    probeCanvas.width = w; probeCanvas.height = h;
    const v = $('preview');
    const draw = () => {
      if (!probeStream) return;
      if (v.videoWidth) probeCtx.drawImage(v, 0, 0, w, h);
      else { probeCtx.fillStyle = '#111'; probeCtx.fillRect(0, 0, w, h); }
      drawBarcode(probeCtx, w, h, performance.now());
      probeRaf = requestAnimationFrame(draw);
    };
    probeStream = probeCanvas.captureStream(60);
    const canvasTrack = probeStream.getVideoTracks()[0];
    if (!origVideoTrack) origVideoTrack = stream.getVideoTracks()[0];
    for (const { sender } of pcs.values()) {
      try { await sender.replaceTrack(canvasTrack); } catch (e) { console.warn('replaceTrack', e); }
    }
    probeRaf = requestAnimationFrame(draw);
  }

  async function stopProbe() {
    if (probeRaf) { cancelAnimationFrame(probeRaf); probeRaf = null; }
    if (probeStream) { probeStream.getTracks().forEach(t => t.stop()); probeStream = null; }
    if (origVideoTrack) {
      for (const { sender } of pcs.values()) {
        try { await sender.replaceTrack(origVideoTrack); } catch {}
      }
    }
    origVideoTrack = null;
  }

  function onProbeMessage(ev, dc) {
    let m; try { m = JSON.parse(ev.data); } catch { return; }
    if (m.type === 'ping' && dc.readyState === 'open') {
      dc.send(JSON.stringify({ type: 'pong', t1: m.t1, t2: performance.now() }));
    }
  }

  async function setProbe(on) {
    probeActive = on;
    SS.set('probe', on);
    $('probe').classList.toggle('stop', on);
    $('probe').textContent = on ? 'Probe (on)' : 'Probe';
    if (on) await startProbe(); else await stopProbe();
  }
  $('probe').onclick = () => setProbe(!probeActive);

  // ---- Stats: aggregate from first pc (representative) ----
  function startStats() {
    if (statsTimer) clearInterval(statsTimer);
    let lastBytes = 0, lastTs = 0, lastFrames = 0;
    statsTimer = setInterval(async () => {
      const first = pcs.values().next().value;
      if (!first) return;
      const stats = await first.pc.getStats();
      const codecs = new Map();
      let row, remote;
      stats.forEach(r => { if (r.type === 'codec') codecs.set(r.id, r); });
      stats.forEach(r => {
        if (r.type === 'outbound-rtp' && r.kind === 'video') row = r;
        if (r.type === 'remote-inbound-rtp' && r.kind === 'video') remote = r;
      });
      if (!row) return;
      const dt = (row.timestamp - lastTs) / 1000;
      const bitrate = lastTs ? (8 * (row.bytesSent - lastBytes) / dt / 1e6) : 0;
      const fps = lastTs ? ((row.framesEncoded - lastFrames) / dt) : 0;
      lastTs = row.timestamp; lastBytes = row.bytesSent; lastFrames = row.framesEncoded;
      const c = codecs.get(row.codecId);
      const mime = c ? c.mimeType.replace('video/','') : '?';
      const encMs = row.totalEncodeTime && row.framesEncoded ? (1000 * row.totalEncodeTime / row.framesEncoded) : null;
      const rttMs = remote?.roundTripTime != null ? remote.roundTripTime * 1000
                  : (row.roundTripTime != null ? row.roundTripTime * 1000 : null);
      const n = pcs.size;
      $('stat').textContent =
        `${row.frameWidth||0}x${row.frameHeight||0}  ${fps.toFixed(0)}fps  ${bitrate.toFixed(2)} Mbps  ${mime}` +
        `${n > 1 ? '  ×' + n + ' receivers' : ''}\n` +
        `enc ${encMs != null ? encMs.toFixed(1)+'ms' : '?'}  ` +
        `rtt ${rttMs != null ? rttMs.toFixed(0)+'ms' : '?'}  ` +
        `net~${rttMs != null ? (rttMs/2).toFixed(0)+'ms' : '?'}  ` +
        `qp~${row.qpSum && row.framesEncoded ? (row.qpSum/row.framesEncoded).toFixed(1) : '?'}`;
    }, 1000);
  }

  // ---- Init ----
  $('go').onclick = () => start('camera');
  $('screen').onclick = () => start('screen');
  // Most phone browsers don't expose getDisplayMedia. Surface that up front
  // instead of throwing a cryptic error when the user taps Screen.
  if (typeof navigator.mediaDevices?.getDisplayMedia !== 'function') {
    $('screen').disabled = true;
    $('screen').title = 'Screen capture not supported on this browser';
  }
  setAudio(LS.get('audio', false));
  document.addEventListener('visibilitychange', () => {
    if (document.hidden && pcs.size > 0) setStatus('backgrounded — video may stall');
  });
  document.addEventListener('visibilitychange', async () => {
    if (!document.hidden && stream && !wakeLock) await acquireWake();
  });
  persistSelect('res');
  persistSelect('codec');
  listCams()
    .then(async () => {
      persistSelect('cam');
      setStatus('ready');
      if (SS.get('streaming')) {
        const src = SS.get('source', 'camera');
        try {
          await start(src);
          if (SS.get('probe')) await setProbe(true);
          if (SS.get('blank')) setBlanked(true);
        } catch (e) {
          console.warn('[reflektor] auto-resume failed:', e);
          SS.set('streaming', false);
        }
      }
    })
    .catch(e => setStatus('init err: ' + e.message));
})();
</script>
</body>
</html>
