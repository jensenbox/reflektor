<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#000000">
<link rel="manifest" href="/receiver.webmanifest">
<link rel="icon" type="image/svg+xml" href="/icon-receiver.svg">
<title>Reflektor — TV</title>
<style>
  html,body{margin:0;height:100%;background:#000;color:#fff;font-family:system-ui,sans-serif;overflow:hidden;cursor:none}
  #v{position:fixed;inset:0;width:100%;height:100%;object-fit:contain;background:#000}
  #msg{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;font-size:3vw;color:rgba(255,255,255,.55);text-align:center;pointer-events:none}
  #stat{position:fixed;bottom:1vw;right:1vw;font:1.1vw ui-monospace,SFMono-Regular,Menlo,monospace;background:rgba(0,0,0,.55);padding:.5em .7em;border-radius:.4em;opacity:.65;color:#eaeaea;white-space:pre-wrap;text-align:right}
  #stat.hidden{display:none}
  #probe{position:fixed;top:1vw;left:1vw;font:bold 2.4vw ui-monospace,SFMono-Regular,Menlo,monospace;color:#4eff7a;background:rgba(0,0,0,.55);padding:.35em .7em;border-radius:.4em;z-index:5;letter-spacing:.02em}
  #probe.hidden{display:none}
</style>
</head>
<body>
<video id="v" autoplay muted playsinline></video>
<div id="msg">Waiting for camera…</div>
<div id="stat" class="hidden"></div>
<div id="probe" class="hidden">latency — ms</div>
<script>
(() => {
  const v = document.getElementById('v');
  const msg = document.getElementById('msg');
  const stat = document.getElementById('stat');
  const probeEl = document.getElementById('probe');
  let pc = null, ws = null;
  // Server identity — reload if it changes across reconnects (auto-update on deploy).
  let serverId = null;

  // Latency probe state
  let probeChannel = null, probeCanvas = null, probeCtx = null;
  let probeDecodeTimer = null, probePingTimer = null;
  let clockOffsetSamples = [], clockOffset = 0;     // receiver_time - sender_time
  let latencySamples = [], lastValidAt = 0;

  function showMsg(text) { msg.textContent = text; msg.style.display = 'flex'; }
  function hideMsg() { msg.style.display = 'none'; }

  function connectWs() {
    showMsg('Connecting…');
    ws = new WebSocket(`wss://${location.host}/ws?role=receiver`);
    ws.onopen = () => { showMsg('Waiting for camera…'); };
    ws.onclose = () => { setTimeout(connectWs, 1000); };
    ws.onerror = () => {};
    ws.onmessage = async ({ data }) => {
      const m = JSON.parse(data);
      if (m.type === 'hello') {
        if (serverId && serverId !== m.serverId) {
          console.log('[reflektor] server restarted, reloading');
          location.reload();
          return;
        }
        serverId = m.serverId;
        return;
      }
      if (m.type === 'offer') {
        if (pc) { try { pc.close(); } catch {} }
        stopProbe();
        pc = new RTCPeerConnection({ iceServers: [] });

        pc.ondatachannel = (e) => {
          if (e.channel.label === 'probe') startProbe(e.channel);
        };

        pc.ontrack = (e) => {
          v.srcObject = e.streams[0];
          // Minimize jitter buffer for live feel
          try { if ('playoutDelayHint' in e.receiver) e.receiver.playoutDelayHint = 0; } catch {}
          try { if (e.receiver.jitterBufferTarget !== undefined) e.receiver.jitterBufferTarget = 0; } catch {}
          v.play().catch((err) => {
            console.warn('autoplay blocked, will resume on first interaction:', err);
            showMsg('Tap to start');
          });
          hideMsg();
        };
        pc.onicecandidate = (e) => {
          if (e.candidate && ws.readyState === 1) ws.send(JSON.stringify({ type: 'ice', candidate: e.candidate }));
        };
        pc.onconnectionstatechange = () => {
          const s = pc.connectionState;
          if (s === 'failed' || s === 'disconnected' || s === 'closed') showMsg('Reconnecting…');
        };

        await pc.setRemoteDescription(m);
        const ans = await pc.createAnswer();
        await pc.setLocalDescription(ans);
        ws.send(JSON.stringify(ans));
      } else if (m.type === 'ice' && pc) {
        await pc.addIceCandidate(m.candidate).catch(() => {});
      }
    };
  }
  connectWs();

  // Stats overlay (toggle with any keypress / remote OK button)
  setInterval(async () => {
    if (!pc || stat.classList.contains('hidden')) return;
    const stats = await pc.getStats();
    const codecs = new Map();
    let row;
    stats.forEach(r => { if (r.type === 'codec') codecs.set(r.id, r); });
    stats.forEach(r => { if (r.type === 'inbound-rtp' && r.kind === 'video') row = r; });
    if (!row) return;
    const c = codecs.get(row.codecId);
    const mime = c ? c.mimeType.replace('video/','') : '?';
    const decMs = row.totalDecodeTime && row.framesDecoded
      ? (1000 * row.totalDecodeTime / row.framesDecoded) : null;
    const asmMs = row.totalAssemblyTime && row.framesAssembled
      ? (1000 * row.totalAssemblyTime / row.framesAssembled) : null;
    const jbMs = row.jitterBufferDelay && row.jitterBufferEmittedCount
      ? (1000 * row.jitterBufferDelay / row.jitterBufferEmittedCount) : null;
    // Receiver-side "system latency" estimate (excludes camera capture and TV pixel-response):
    //   decode + frame-assembly + jitter-buffer.  Add the sender-shown net~ for a rough total.
    const localMs = (decMs || 0) + (asmMs || 0) + (jbMs || 0);
    stat.textContent =
      `${row.frameWidth||0}x${row.frameHeight||0} @ ${row.framesPerSecond ? row.framesPerSecond.toFixed(0) : '-'}fps  ${mime}\n` +
      `dropped ${row.framesDropped||0}  ` +
      `dec ${decMs != null ? decMs.toFixed(1)+'ms' : '?'}  ` +
      `asm ${asmMs != null ? asmMs.toFixed(1)+'ms' : '?'}  ` +
      `jb ${jbMs != null ? jbMs.toFixed(0)+'ms' : '?'}  ` +
      `rx~${localMs.toFixed(0)}ms`;
  }, 1000);

  document.addEventListener('keydown', (e) => {
    if (e.key === 'f' || e.key === 'F') {
      if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(() => {});
      else document.exitFullscreen().catch(() => {});
    } else {
      stat.classList.toggle('hidden');
    }
  });
  // Tap to toggle stats (useful via TV remote select)
  // Also kicks autoplay-blocked playback awake on the first interaction.
  document.addEventListener('click', () => {
    stat.classList.toggle('hidden');
    if (v.paused && v.srcObject) v.play().then(hideMsg).catch(() => {});
  });

  // ----- Latency probe: decode 32-bit timestamp barcode + ping/pong clock sync -----
  function startProbe(channel) {
    probeChannel = channel;
    // Keep overlay hidden until we actually decode a valid latency value.
    probeEl.classList.add('hidden');
    clockOffsetSamples = []; latencySamples = []; lastValidAt = 0;
    probeChannel.onopen = () => {
      probePingTimer = setInterval(sendPing, 500);
      sendPing();
    };
    probeChannel.onmessage = onProbeMessage;
    probeChannel.onclose = stopProbe;
    if (!probeCanvas) {
      probeCanvas = document.createElement('canvas');
      probeCtx = probeCanvas.getContext('2d', { willReadFrequently: true, alpha: false });
    }
    if (!probeDecodeTimer) probeDecodeTimer = setInterval(decodeFrame, 100);  // 10 Hz
  }

  function stopProbe() {
    if (probePingTimer) { clearInterval(probePingTimer); probePingTimer = null; }
    if (probeDecodeTimer) { clearInterval(probeDecodeTimer); probeDecodeTimer = null; }
    if (probeChannel) { try { probeChannel.close(); } catch {} probeChannel = null; }
    probeEl.classList.add('hidden');
  }

  function sendPing() {
    if (probeChannel?.readyState === 'open') {
      probeChannel.send(JSON.stringify({ type: 'ping', t1: performance.now() }));
    }
  }

  function onProbeMessage(ev) {
    let m; try { m = JSON.parse(ev.data); } catch { return; }
    if (m.type !== 'pong') return;
    const t3 = performance.now();
    const rtt = t3 - m.t1;
    const oneWay = rtt / 2;
    // perf_R = perf_S + offset ; at pong-recv: perf_S ≈ m.t2 + oneWay
    const offset = t3 - (m.t2 + oneWay);
    clockOffsetSamples.push(offset);
    if (clockOffsetSamples.length > 10) clockOffsetSamples.shift();
    const sorted = [...clockOffsetSamples].sort((a, b) => a - b);
    clockOffset = sorted[Math.floor(sorted.length / 2)];
  }

  function decodeFrame() {
    if (!v.videoWidth || !v.videoHeight) return;
    const w = v.videoWidth, h = v.videoHeight;
    const rowH = Math.max(28, Math.floor(h * 0.05));
    probeCanvas.width = w; probeCanvas.height = rowH;
    probeCtx.drawImage(v, 0, 0, w, rowH, 0, 0, w, rowH);
    const data = probeCtx.getImageData(0, 0, w, rowH).data;
    const bits = 32;
    const colW = w / bits;
    const sampleY = Math.floor(rowH / 2);
    let value = 0;
    for (let i = 0; i < bits; i++) {
      const sampleX = Math.floor(colW * (i + 0.5));
      const idx = (sampleY * w + sampleX) * 4;
      const lum = 0.299 * data[idx] + 0.587 * data[idx + 1] + 0.114 * data[idx + 2];
      if (lum > 128) value |= (1 << i);
    }
    // value is the sender's performance.now() in ms at encode time (unsigned 32-bit)
    const sentMs = (value >>> 0);
    // Convert sender timestamp to receiver timeline.
    const receivedSenderTime = sentMs + clockOffset;
    const latency = performance.now() - receivedSenderTime;
    if (latency > -50 && latency < 2000 && clockOffsetSamples.length >= 3) {
      latencySamples.push(latency);
      if (latencySamples.length > 10) latencySamples.shift();
      const sorted = [...latencySamples].sort((a, b) => a - b);
      const median = sorted[Math.floor(sorted.length / 2)];
      probeEl.textContent = `latency ${median.toFixed(0)} ms`;
      probeEl.classList.remove('hidden');
      lastValidAt = performance.now();
    } else if (lastValidAt && performance.now() - lastValidAt > 2000) {
      probeEl.classList.add('hidden');
    }
  }

  if ('serviceWorker' in navigator) {
    addEventListener('load', () => navigator.serviceWorker.register('/sw.js').catch(() => {}));
  }
})();
</script>
</body>
</html>
