services:
  reflektor:
    image: ghcr.io/jensenbox/reflektor:latest
    container_name: reflektor
    restart: unless-stopped
    environment:
      # Required: LAN IP this host serves on. Used for cert SAN + mDNS A-record.
      LAN_IP: ${LAN_IP:-192.168.16.10}
      # Optional: mDNS hostname to publish (defaults to reflektor.local).
      MDNS_HOSTNAME: ${MDNS_HOSTNAME:-reflektor.local}
      # Optional: enable PIN gate (HTTP Basic auth). Leave empty for no auth.
      PIN: ${PIN:-}
      # Optional: allow more than one receiver to view the same stream.
      MULTI_RECEIVER: ${MULTI_RECEIVER:-0}
    ports:
      - "8443:8443"
      - "8080:8080"
    volumes:
      - ./certs:/app/certs
      # Mounted-in host avahi-daemon socket so the container can publish
      # reflektor.local via the host's mDNS responder. Optional: if absent,
      # mDNS is skipped and you reach the box by IP only.
      - /var/run/avahi-daemon/socket:/var/run/avahi-daemon/socket
